name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment containing operator-specific deploy config
        required: true
        default: production

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    env:
      WRANGLER_CONFIG: wrangler.generated.toml
      WORKER_NAME: ${{ vars.WORKER_NAME }}
      WORKER_CUSTOM_DOMAIN: ${{ vars.WORKER_CUSTOM_DOMAIN }}
      WORKERS_DEV: ${{ vars.WORKERS_DEV }}
      PREVIEW_URLS: ${{ vars.PREVIEW_URLS }}
      D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
      D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
      SEND_QUEUE_NAME: ${{ vars.SEND_QUEUE_NAME }}
      FROM_EMAIL: ${{ vars.FROM_EMAIL }}
      BASE_URL: ${{ vars.BASE_URL }}
      SITE_URL: ${{ vars.SITE_URL }}
      SITE_NAME: ${{ vars.SITE_NAME }}
      SITE_TAGLINE: ${{ vars.SITE_TAGLINE }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
      COMPANY_ADDRESS: ${{ vars.COMPANY_ADDRESS }}
      UNSUBSCRIBE_MAILTO: ${{ vars.UNSUBSCRIBE_MAILTO }}
      NOTIFY_EMAIL: ${{ vars.NOTIFY_EMAIL }}
      DIGEST_EMAIL: ${{ vars.DIGEST_EMAIL }}
      CRON_SCHEDULE: ${{ vars.CRON_SCHEDULE }}
      RATE_LIMIT_NAMESPACE_ID: ${{ vars.RATE_LIMIT_NAMESPACE_ID }}
      RATE_LIMIT_LIMIT: ${{ vars.RATE_LIMIT_LIMIT }}
      RATE_LIMIT_PERIOD: ${{ vars.RATE_LIMIT_PERIOD }}
      QUEUE_MAX_BATCH_SIZE: ${{ vars.QUEUE_MAX_BATCH_SIZE }}
      QUEUE_MAX_RETRIES: ${{ vars.QUEUE_MAX_RETRIES }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Generate Wrangler config
        run: npx tsx scripts/write-wrangler-config.ts
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote --config "$WRANGLER_CONFIG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy worker
        run: npx wrangler deploy --config "$WRANGLER_CONFIG" --var DEPLOY_SHA:$(git rev-parse --short HEAD)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Sync Worker secrets
        run: |
          set_secret() {
            name="$1"
            value="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler secret put "$name" --name "$WORKER_NAME"
            fi
          }

          set_secret RESEND_API_KEY "$RESEND_API_KEY"
          set_secret ADMIN_BEARER_TOKEN "$ADMIN_BEARER_TOKEN"
          set_secret RESEND_WEBHOOK_SECRET "$RESEND_WEBHOOK_SECRET"
          set_secret TURNSTILE_SECRET_KEY "$TURNSTILE_SECRET_KEY"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_BEARER_TOKEN: ${{ secrets.ADMIN_BEARER_TOKEN }}
          RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      - name: Health check
        run: curl -fsS "$BASE_URL/health"
